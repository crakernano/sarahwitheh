<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Contacto - Sarah</title>
		<link rel="stylesheet" href="assets/css/style.css"/>
		<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet"/>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
		<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
	</head>
	<body>
		<script>AOS.init();</script>
		<div class="container">
			<nav class="navbar navbar-expand-lg">
				<div class="container-fluid">
					<a class="navbar-brand" href="index.html">SA_<span style="display:inline-block;transform: rotateY(180deg);">R</span><span style="display:inline-block;transform: rotateX(180deg);">A</span>H<span style="color:#C30001">WITHeH.</span></a>
					<div class="collapse navbar-collapse">
						<div class="navbar-nav">
							<a class="nav-link" href="index.html#projects-container">Proyectos</a>
							<a class="nav-link" href="index.html#competence-section">Habilidades</a>
							<a class="nav-link" href="index.html#skills-section">Sobre mi</a>
						</div>
						<!-- <div class="call-action-section">
							<a class="custom-button button-white" href="contact.html">¿HABLAMOS?  🡥</a>
						</div> -->
					</div>
				</div>
			</nav>
		</div>

		<section  id="contact-section" data-aos="fade-up">
			<div class="container">
				<div class="row">
					<div class="col-lg-6">
						<h2 class="custom-header-2">Trabajamos juntos</h2>
                        <p>Será un placer saber de ti</p>
						<form action="#" method="post" class="contact-form" style="padding-right: 2em;">
							<div class="row g-2">
								<div class="col-12 col-md-5 mb-3" style="margin-right: 3rem;">
									<label class="form-label">Nombre</label>
									<input class="form-control" type="text" name="first_name" placeholder="Nombre" required />
								</div>
								<div class="col-12 col-md-6 mb-3">
									<label class="form-label">Apellido</label>
									<input class="form-control" type="text" name="last_name" placeholder="Apellido" required />
								</div>
							</div>
							<div class="mb-3">
								<label class="form-label">Correo</label>
								<input class="form-control" type="email" name="email" placeholder="tu@company.com" required />
							</div>
							<div class="mb-3">
								<label class="form-label">Número de teléfono</label>
								<input class="form-control" type="tel" name="phone" placeholder="123 456 789" required />
							</div>
							<div class="mb-3">
								<label class="form-label">Escribe tu mensaje</label>
								<textarea class="form-control" name="message" rows="5" required></textarea>
							</div>
							<button class="custom-button button-red w-100 mt-3" type="submit">Enviar mensaje</button>
						</form>
					</div>
					<div class="col-lg-6" style="position: relative; background-image: url('assets/img/contact_img.jpg'); background-size: cover; background-position: center;">
                    <div class="social-menu-contact">
                        <li><a href="https://www.behance.net/sarahwitheh#" target="_blank"><img src="assets/img/social/social_Be.png"/></a></li>
                        <li><a href="https://www.instagram.com/sarah.s.witheh/" target="_blank"><img src="assets/img/social/social_Instagram.png"/></a></li>
                        <li><a href="https://www.linkedin.com/in/sarah-schaeflé-062235184/" target="_blank"><img src="assets/img/social/social_linkedn.png"/></a></li>
                    </div>
					</div>
				</div>
			</div>
		</section>

		<footer style="padding:3rem 0;text-align:center;">
			<div class="container">
				<p style="margin-top: 2rem;">&copy;<span id="year"></span>, All rights reserved</p>
			</div>
		</footer>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>	
		<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
	</body>
</html>
